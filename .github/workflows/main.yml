name: MLOps CI Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10.12'

      - name: Install dependencies
        run: pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run mlflow project
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model-artifact
          path: MLProject/saved_model/

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Model
        run: |
          cd MLProject
          mlflow models build-docker -m saved_model -n ${{ secrets.DOCKER_USERNAME }}/fraud-model:latest
          
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/fraud-model:latest