name: MLOps CI Pipeline

on:
  push:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install MLflow & Dependencies
        run: pip install mlflow==2.19.0 pandas scikit-learn

      - name: Run MLProject
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Upload Artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: fraud-model-artifact
          path: MLProject/saved_model/

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd MLProject
          # Bikin image pakai mlflow build-docker
          mlflow models build-docker -m saved_model -n ${{ secrets.DOCKER_USERNAME }}/fraud-model:latest
          
          # Push ke Docker Hub
          docker push ${{ secrets.DOCKER_USERNAME }}/fraud-model:latest